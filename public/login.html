<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign In – LastPrice</title>
        <meta
            name="description"
            content="Sign in or create your LastPrice account to start bidding."
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                300: "#F2D499",
                                400: "#E6C07B",
                                500: "#D5805E",
                                600: "#C06A48",
                                700: "#1C1C1C",
                            },
                            sepia: "#B9986F",
                            cream: "#FFF5E6",
                        },
                    },
                },
            };
        </script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");
            * {
                font-family: "Inter", sans-serif;
            }
            .gradient-bg {
                background: linear-gradient(135deg, #0d0d0d 0%, #1a1510 50%, #0d0d0d 100%);
            }
            .glass {
                background: rgba(28, 28, 28, 0.85);
                backdrop-filter: blur(16px);
                border: 1px solid rgba(185, 152, 111, 0.15);
            }
            input:focus {
                outline: none;
                border-color: #e6c07b;
                box-shadow: 0 0 0 3px rgba(230, 192, 123, 0.25);
            }
            .tab-active {
                background: #d5805e;
                color: #fff5e6;
            }
            .tab-inactive {
                background: transparent;
                color: rgba(185, 152, 111, 0.5);
            }
        </style>
    </head>

    <body class="gradient-bg min-h-screen flex items-center justify-center px-4 py-12">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-8">
                <a href="/" class="inline-flex items-center gap-3 mb-4">
                    <div
                        class="w-10 h-10 rounded-xl bg-brand-500 flex items-center justify-center text-xl font-black text-cream"
                    >
                        L
                    </div>
                    <span class="font-bold text-2xl text-brand-400">LastPrice</span>
                </a>
                <p class="text-sepia/50 text-sm">The Silent Negotiator</p>
            </div>

            <!-- Card -->
            <div class="glass rounded-3xl p-8">
                <!-- Tab toggle -->
                <div class="flex rounded-xl overflow-hidden border border-sepia/15 mb-8 p-1 gap-1">
                    <button
                        id="tab-login"
                        onclick="switchTab('login')"
                        class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition tab-active"
                    >
                        Sign In
                    </button>
                    <button
                        id="tab-register"
                        onclick="switchTab('register')"
                        class="flex-1 py-2.5 rounded-lg text-sm font-semibold transition tab-inactive"
                    >
                        Create Account
                    </button>
                </div>

                <!-- Alert box -->
                <div id="alert" class="hidden mb-6 p-4 rounded-xl text-sm font-medium"></div>

                <!-- ── LOGIN FORM ──────────────────────────────── -->
                <form id="form-login" onsubmit="handleLogin(event)" class="space-y-5">
                    <div>
                        <label class="block text-sepia/80 text-sm font-medium mb-2">Email</label>
                        <input
                            id="login-email"
                            type="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            class="w-full bg-[#141414] border border-sepia/15 rounded-xl px-4 py-3 text-cream placeholder-sepia/30 transition"
                            required
                        />
                    </div>
                    <div>
                        <label class="block text-sepia/80 text-sm font-medium mb-2">Password</label>
                        <input
                            id="login-password"
                            type="password"
                            placeholder="••••••••"
                            autocomplete="current-password"
                            class="w-full bg-[#141414] border border-sepia/15 rounded-xl px-4 py-3 text-cream placeholder-sepia/30 transition"
                            required
                        />
                    </div>
                    <button
                        type="submit"
                        id="login-btn"
                        class="w-full py-3.5 rounded-xl bg-brand-500 hover:bg-brand-600 font-semibold text-cream transition flex items-center justify-center gap-2"
                    >
                        Sign In
                    </button>
                    <p class="text-center text-sepia/40 text-sm">
                        Don't have an account?
                        <button
                            type="button"
                            onclick="switchTab('register')"
                            class="text-brand-400 hover:text-brand-300 transition"
                        >
                            Create one →
                        </button>
                    </p>
                </form>

                <!-- ── REGISTER FORM ───────────────────────────────── -->
                <form id="form-register" onsubmit="handleRegister(event)" class="space-y-5 hidden">
                    <div>
                        <label class="block text-sepia/80 text-sm font-medium mb-2">Username</label>
                        <input
                            id="reg-username"
                            type="text"
                            placeholder="bidder123"
                            autocomplete="username"
                            class="w-full bg-[#141414] border border-sepia/15 rounded-xl px-4 py-3 text-cream placeholder-sepia/30 transition"
                            required
                            minlength="3"
                            maxlength="50"
                        />
                    </div>
                    <div>
                        <label class="block text-sepia/80 text-sm font-medium mb-2">Email</label>
                        <input
                            id="reg-email"
                            type="email"
                            placeholder="you@example.com"
                            autocomplete="email"
                            class="w-full bg-[#141414] border border-sepia/15 rounded-xl px-4 py-3 text-cream placeholder-sepia/30 transition"
                            required
                        />
                    </div>
                    <div>
                        <label class="block text-sepia/80 text-sm font-medium mb-2"
                            >Password
                            <span class="text-sepia/30 font-normal">(min 8 chars)</span></label
                        >
                        <input
                            id="reg-password"
                            type="password"
                            placeholder="••••••••"
                            autocomplete="new-password"
                            class="w-full bg-[#141414] border border-sepia/15 rounded-xl px-4 py-3 text-cream placeholder-sepia/30 transition"
                            required
                            minlength="8"
                        />
                    </div>
                    <button
                        type="submit"
                        id="reg-btn"
                        class="w-full py-3.5 rounded-xl bg-brand-500 hover:bg-brand-600 font-semibold text-cream transition"
                    >
                        Create Account
                    </button>
                    <p class="text-center text-sepia/40 text-sm">
                        Already have an account?
                        <button
                            type="button"
                            onclick="switchTab('login')"
                            class="text-brand-400 hover:text-brand-300 transition"
                        >
                            Sign in →
                        </button>
                    </p>
                </form>
            </div>

            <p class="text-center text-sepia/20 text-xs mt-6">
                By joining you agree to our terms of service.
            </p>
        </div>

        <script src="/js/api.js"></script>
        <script src="/js/auth.js"></script>
        <script>
            authHelper.redirectIfLoggedIn("/dashboard.html");
            if (new URLSearchParams(window.location.search).get("tab") === "register")
                switchTab("register");

            function switchTab(tab) {
                const isLogin = tab === "login";
                document.getElementById("form-login").classList.toggle("hidden", !isLogin);
                document.getElementById("form-register").classList.toggle("hidden", isLogin);
                document.getElementById("tab-login").className =
                    "flex-1 py-2.5 rounded-lg text-sm font-semibold transition " +
                    (isLogin ? "tab-active" : "tab-inactive");
                document.getElementById("tab-register").className =
                    "flex-1 py-2.5 rounded-lg text-sm font-semibold transition " +
                    (!isLogin ? "tab-active" : "tab-inactive");
                hideAlert();
            }

            function showAlert(msg, type = "error") {
                const el = document.getElementById("alert");
                el.textContent = msg;
                el.className = `mb-6 p-4 rounded-xl text-sm font-medium ${type === "error" ? "bg-red-500/20 border border-red-500/40 text-red-300" : "bg-green-500/20 border border-green-500/40 text-green-300"}`;
            }
            function hideAlert() {
                document.getElementById("alert").className =
                    "hidden mb-6 p-4 rounded-xl text-sm font-medium";
            }

            async function handleLogin(e) {
                e.preventDefault();
                hideAlert();
                const btn = document.getElementById("login-btn");
                btn.textContent = "Signing in…";
                btn.disabled = true;
                try {
                    const data = await api.post("/api/auth/login", {
                        email: document.getElementById("login-email").value,
                        password: document.getElementById("login-password").value,
                    });
                    authHelper.setAuth(data.token, data.user);
                    window.location.href = "/dashboard.html";
                } catch (err) {
                    showAlert(err.message || "Login failed");
                    btn.textContent = "Sign In";
                    btn.disabled = false;
                }
            }

            async function handleRegister(e) {
                e.preventDefault();
                hideAlert();
                const btn = document.getElementById("reg-btn");
                btn.textContent = "Creating account…";
                btn.disabled = true;
                try {
                    const data = await api.post("/api/auth/register", {
                        username: document.getElementById("reg-username").value,
                        email: document.getElementById("reg-email").value,
                        password: document.getElementById("reg-password").value,
                    });
                    authHelper.setAuth(data.token, data.user);
                    window.location.href = "/dashboard.html";
                } catch (err) {
                    showAlert(err.message || "Registration failed");
                    btn.textContent = "Create Account";
                    btn.disabled = false;
                }
            }
        </script>
    </body>
</html>
