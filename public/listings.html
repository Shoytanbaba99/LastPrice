<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Live Arenas – HaggleArena</title>
        <meta
            name="description"
            content="Browse all live HaggleArena auctions and place your silent bid."
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            brand: {
                                300: "#E6C07B",
                                400: "#E6C07B",
                                500: "#D5805E",
                                600: "#D5805E",
                                700: "#1C1C1C",
                            },
                        },
                    },
                },
            };
        </script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");

            * {
                font-family: "Inter", sans-serif;
            }

            .bg-[#0D0D0D] {
                background: linear-gradient(135deg, #0D0D0D, #1C1C1C, #0D0D0D);
                min-height: 100vh;
            }

            .glass {
                background: rgba(28, 28, 28, 0.8);
                backdrop-filter: blur(12px);
                border: 1px solid #2A2A2A;
            }

            .listing-card {
                transition:
                    transform 0.25s,
                    box-shadow 0.25s;
            }

            .listing-card:hover {
                transform: translateY(-4px);
                box-shadow: 0 16px 40px rgba(229, 192, 123, 0.4);
            }

            .countdown-red {
                color: #ef4444;
            }

            .countdown-yellow {
                color: #f59e0b;
            }

            .countdown-green {
                color: #22c55e;
            }
        </style>
    </head>

    <body class="bg-[#0D0D0D] text-[#B9986F]">
        <nav class="glass sticky top-0 z-50 px-6 py-4">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-bold text-xl">
                    <div
                        class="w-8 h-8 rounded-xl bg-brand-600 flex items-center justify-center font-black text-base"
                    >
                        H
                    </div>
                    HaggleArena
                </a>
                <div class="flex items-center gap-3">
                    <a
                        href="/dashboard.html"
                        class="glass px-3 py-1.5 rounded-xl text-sm hover:bg-[#2A2A2A] transition"
                        >Dashboard</a
                    >
                    <a
                        href="/create-listing.html"
                        class="px-3 py-1.5 rounded-xl bg-brand-600 hover:bg-brand-500 text-sm font-semibold transition"
                        >+ List Item</a
                    >
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-bold">Live Arenas</h1>
                    <p class="text-[#B9986F]/40 mt-1 text-sm">
                        Silent bids only · Reserve price hidden · Best offer wins
                    </p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-[#B9986F]/50 text-sm" id="listing-count">Loading…</span>
                </div>
            </div>

            <!-- LISTINGS GRID -->
            <div
                id="listings-grid"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5"
            >
                <div class="col-span-full text-center text-[#B9986F]/30 py-20 text-sm">
                    Loading live arenas…
                </div>
            </div>
        </main>

        <script src="/js/api.js"></script>
        <script src="/js/auth.js"></script>
        <script>
            const loggedIn = authHelper.isLoggedIn();
            if (loggedIn) {
                authHelper.refreshUser();
            }

            function fmtCountdown(endTime) {
                const diff = new Date(endTime) - new Date();
                if (diff <= 0) return { text: "Ended", cls: "countdown-red" };
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                const cls =
                    diff < 3600000
                        ? "countdown-red"
                        : diff < 21600000
                          ? "countdown-yellow"
                          : "countdown-green";
                const text = h > 0 ? `${h}h ${m}m` : `${m}m ${s}s`;
                return { text, cls };
            }

            function escHtml(str) {
                return String(str)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            function renderListings(listings) {
                const grid = document.getElementById("listings-grid");
                document.getElementById("listing-count").textContent =
                    `${listings.length} arena${listings.length !== 1 ? "s" : ""} live`;

                if (!listings.length) {
                    grid.innerHTML = `<div class="col-span-full text-center py-24">
        <div class="text-6xl mb-4">🏟️</div>
        <div class="text-[#B9986F]/40 text-lg mb-4">No live arenas right now</div>
        <a href="/create-listing.html" class="inline-block px-6 py-3 rounded-xl bg-brand-600 hover:bg-brand-500 font-semibold transition">List Something →</a>
      </div>`;
                    return;
                }

                grid.innerHTML = listings
                    .map((l) => {
                        const cd = fmtCountdown(l.arena_end_time);
                        const img = l.photo_url
                            ? `<img src="${l.photo_url}" class="w-full h-full object-cover" alt="${escHtml(l.title)}">`
                            : `<div class="w-full h-full flex items-center justify-center text-5xl">🏷️</div>`;
                        return `
      <a href="/listing-detail.html?id=${l.id}" class="glass rounded-2xl overflow-hidden listing-card block">
        <div class="h-48 bg-[#1C1C1C] overflow-hidden">${img}</div>
        <div class="p-5">
          <div class="text-[#B9986F]/40 text-xs mb-1">${escHtml(l.seller_name)}</div>
          <h3 class="font-bold text-base mb-3 line-clamp-2">${escHtml(l.title)}</h3>
          <div class="flex items-center justify-between mb-3">
            <span class="text-xl font-black text-brand-400">$${parseFloat(l.display_price).toFixed(2)}</span>
            <span class="glass text-xs px-2 py-1 rounded-full">${l.participant_count} bidder${l.participant_count !== 1 ? "s" : ""}</span>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs ${cd.cls} font-semibold">⏱ ${cd.text}</span>
            <span class="text-xs px-2.5 py-1 rounded-full bg-[#E6C07B]/20 text-[#E6C07B] font-medium">Bid Silently →</span>
          </div>
        </div>
      </a>`;
                    })
                    .join("");
            }

            async function loadListings() {
                try {
                    const data = await api.get("/api/listings");
                    renderListings(data.listings);
                } catch (e) {
                    document.getElementById("listings-grid").innerHTML =
                        `<div class="col-span-full text-center text-red-400 py-16">Failed to load listings: ${e.message}</div>`;
                }
            }

            loadListings();
            // Refresh countdown timers every 30s
            setInterval(loadListings, 30000);
        </script>
    </body>
</html>
