<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Live Listings – LastPrice</title>
        <meta name="description" content="Browse all live LastPrice listings and place your silent bid." />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>tailwind.config = { theme: { extend: { colors: {
            brand: { 300: "#F2D499", 400: "#E6C07B", 500: "#D5805E", 600: "#C06A48", 700: "#1C1C1C" },
            sepia: "#B9986F", cream: "#FFF5E6"
        }}}}</script>
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");
            * { font-family: "Inter", sans-serif; }
            body { background: linear-gradient(135deg, #0D0D0D 0%, #1A1510 50%, #0D0D0D 100%); min-height: 100vh; }
            .glass { background: rgba(28,28,28,0.85); backdrop-filter: blur(12px); border: 1px solid rgba(185,152,111,0.15); }
            .listing-card { transition: transform 0.25s, box-shadow 0.25s; }
            .listing-card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(185, 152, 111, 0.15); }
        </style>
    </head>

    <body class="text-sepia">
        <nav class="glass sticky top-0 z-50 px-6 py-4">
            <div class="max-w-7xl mx-auto flex items-center justify-between">
                <a href="/" class="flex items-center gap-2 font-bold text-xl">
                    <div class="w-8 h-8 rounded-xl bg-brand-500 flex items-center justify-center font-black text-base text-cream">L</div>
                    <span class="text-brand-400">LastPrice</span>
                </a>
                <div class="flex items-center gap-3">
                    <a href="/dashboard.html" class="glass px-3 py-1.5 rounded-xl text-sm text-sepia/70 hover:text-brand-400 transition">Dashboard</a>
                    <a href="/create-listing.html" class="px-3 py-1.5 rounded-xl bg-brand-500 hover:bg-brand-600 text-sm font-semibold text-cream transition">+ List Item</a>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 py-10">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-bold text-cream">Live Listings</h1>
                    <p class="text-sepia/50 mt-1 text-sm">Silent bids only \u00b7 Reserve price hidden \u00b7 Best offer wins</p>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-2.5 h-2.5 rounded-full bg-green-400 animate-pulse"></div>
                    <span class="text-sepia/50 text-sm" id="listing-count">Loading\u2026</span>
                </div>
            </div>

            <div id="listings-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
                <div class="col-span-full text-center text-sepia/30 py-20 text-sm">Loading live listings\u2026</div>
            </div>
        </main>

        <script src="/js/api.js"></script>
        <script src="/js/auth.js"></script>
        <script>
            const loggedIn = authHelper.isLoggedIn();
            if (loggedIn) authHelper.refreshUser();

            function fmtCountdown(endTime) {
                const diff = new Date(endTime) - new Date();
                if (diff <= 0) return { text: "Ended", cls: "text-red-400" };
                const h = Math.floor(diff / 3600000);
                const m = Math.floor((diff % 3600000) / 60000);
                const s = Math.floor((diff % 60000) / 1000);
                const cls = diff < 3600000 ? "text-red-400" : diff < 21600000 ? "text-amber-400" : "text-green-400";
                const text = h > 0 ? `${h}h ${m}m` : `${m}m ${s}s`;
                return { text, cls };
            }

            function escHtml(str) { return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

            function renderListings(listings) {
                const grid = document.getElementById("listings-grid");
                document.getElementById("listing-count").textContent = `${listings.length} listing${listings.length !== 1 ? "s" : ""} live`;
                if (!listings.length) {
                    grid.innerHTML = `<div class="col-span-full text-center py-24">
                        <div class="text-6xl mb-4">\ud83c\udfdf\ufe0f</div>
                        <div class="text-sepia/40 text-lg mb-4">No live listings right now</div>
                        <a href="/create-listing.html" class="inline-block px-6 py-3 rounded-xl bg-brand-500 hover:bg-brand-600 font-semibold text-cream transition">List Something \u2192</a>
                    </div>`;
                    return;
                }
                grid.innerHTML = listings.map(l => {
                    const cd = fmtCountdown(l.arena_end_time);
                    const img = l.photo_url
                        ? `<img src="${l.photo_url}" class="w-full h-full object-cover" alt="${escHtml(l.title)}">`
                        : `<div class="w-full h-full flex items-center justify-center text-5xl bg-[#1A1510]">\ud83c\udff7\ufe0f</div>`;
                    return `
                    <a href="/listing-detail.html?id=${l.id}" class="glass rounded-2xl overflow-hidden listing-card block">
                        <div class="h-48 bg-[#141414] overflow-hidden">${img}</div>
                        <div class="p-5">
                            <div class="text-sepia/50 text-xs mb-1">${escHtml(l.seller_name)}</div>
                            <h3 class="font-bold text-base mb-3 line-clamp-2 text-cream">${escHtml(l.title)}</h3>
                            <div class="flex items-center justify-between mb-3">
                                <span class="text-xl font-black text-brand-400">$${parseFloat(l.display_price).toFixed(2)}</span>
                                <span class="glass text-xs px-2 py-1 rounded-full text-sepia/60">${l.participant_count} bidder${l.participant_count !== 1 ? "s" : ""}</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-xs ${cd.cls} font-semibold">\u23f1 ${cd.text}</span>
                                <span class="text-xs px-2.5 py-1 rounded-full bg-brand-500/20 text-brand-400 font-medium">Bid Silently \u2192</span>
                            </div>
                        </div>
                    </a>`;
                }).join("");
            }

            async function loadListings() {
                try {
                    const data = await api.get("/api/listings");
                    renderListings(data.listings);
                } catch (e) {
                    document.getElementById("listings-grid").innerHTML = `<div class="col-span-full text-center text-red-400 py-16">Failed to load listings: ${e.message}</div>`;
                }
            }

            loadListings();
            setInterval(loadListings, 30000);
        </script>
    </body>
</html>
